<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro-Explorador · Manual de Examen Neurológico</title>
<style>
  :root{
    --navy:#152a52;
    --navy-2:#1f3d73;
    --ink:#1b2436;
    --slate:#57678a;
    --slate-soft:#8a97b5;
    --bg:#f3f5fb;
    --card:#ffffff;
    --line:#dfe4f0;
    --teal:#0f8a83;
    --teal-soft:#e3f5f3;
    --coral:#d1495b;
    --coral-soft:#fbe7e9;
    --amber:#c8871a;
    --amber-soft:#fbf1de;
    --font-display:'Fraunces', Georgia, serif;
    --font-body:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --font-mono:'JetBrains Mono', 'Courier New', monospace;
  }
  @font-face{
    font-family:'Fraunces';
    src:local('Georgia');
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 100% 0%, #1f3d7318 0%, transparent 45%),
      var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    padding:0 0 60px 0;
  }
  ::selection{background:#c9dcff;}

  /* ---------- HEADER ---------- */
  header.top{
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
    color:#fff;
    padding:34px 5vw 26px;
    position:relative;
    overflow:hidden;
  }
  header.top::after{
    content:"";
    position:absolute; right:-60px; top:-60px;
    width:220px; height:220px; border-radius:50%;
    background:radial-gradient(circle,#ffffff14,transparent 70%);
  }
  .eyebrow{
    font-family:var(--font-mono);
    letter-spacing:.14em;
    text-transform:uppercase;
    font-size:11.5px;
    color:#9fb3e8;
    display:flex; align-items:center; gap:10px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:#59d6c4;box-shadow:0 0 0 3px #59d6c422;}
  h1.brand{
    font-family:var(--font-display);
    font-weight:600;
    font-size:clamp(28px,4vw,44px);
    margin:6px 0 4px;
    letter-spacing:-0.01em;
  }
  .brand-sub{color:#c3cdea;font-size:14.5px;max-width:640px;line-height:1.5;}

  .score-pill{
    position:absolute; top:34px; right:5vw;
    background:#ffffff12;
    border:1px solid #ffffff26;
    border-radius:14px;
    padding:10px 18px;
    text-align:right;
    backdrop-filter:blur(6px);
    font-family:var(--font-mono);
  }
  .score-pill .n{font-size:22px;font-weight:700;color:#7ee0d1;}
  .score-pill .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#a9b7de;}

  /* ---------- NAV ---------- */
  nav.chapters{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    padding:20px 5vw 0;
    max-width:1400px;
    margin:0 auto;
  }
  .ch-btn{
    border:1px solid var(--line);
    background:var(--card);
    color:var(--slate);
    padding:9px 15px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    display:flex; align-items:center; gap:8px;
    transition:all .15s ease;
    white-space:nowrap;
  }
  .ch-btn .num{
    font-family:var(--font-mono);
    background:var(--bg);
    color:var(--slate-soft);
    border-radius:6px;
    padding:1px 6px;
    font-size:11px;
  }
  .ch-btn:hover{border-color:var(--navy-2); color:var(--navy);}
  .ch-btn.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  .ch-btn.active .num{background:#ffffff22; color:#fff;}
  .ch-btn.done::before{content:"✓ "; color:var(--teal); font-weight:800;}
  .ch-btn.quiz-btn{background:var(--coral); color:#fff; border-color:var(--coral); margin-left:auto;}
  .ch-btn.quiz-btn:hover{filter:brightness(1.06);}

  main{max-width:1400px; margin:0 auto; padding:26px 5vw 0;}

  /* ---------- CHAPTER VIEW ---------- */
  .chapter-head{margin-bottom:18px;}
  .chapter-head .kicker{font-family:var(--font-mono); font-size:11.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--teal); font-weight:700;}
  .chapter-head h2{font-family:var(--font-display); font-size:clamp(24px,3vw,32px); margin:4px 0 6px; color:var(--navy);}
  .chapter-head p{color:var(--slate); font-size:14.5px; max-width:720px; line-height:1.55;}

  .progress-track{height:6px; background:var(--line); border-radius:4px; overflow:hidden; max-width:320px; margin-top:10px;}
  .progress-fill{height:100%; background:linear-gradient(90deg,var(--teal),#59d6c4); border-radius:4px; transition:width .4s ease;}

  .split{
    display:grid;
    grid-template-columns:1.05fr 1fr;
    gap:22px;
    align-items:start;
  }
  @media (max-width:880px){ .split{grid-template-columns:1fr;} }

  .panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:20px;
  }
  .panel-diagram{
    position:sticky; top:16px;
  }
  .diagram-caption{
    font-size:12px; color:var(--slate-soft); margin-top:10px; text-align:center;
    font-style:italic;
  }
  svg.diagram{width:100%; height:auto; display:block;}

  .hotspot circle{ fill:var(--navy-2); stroke:#fff; stroke-width:2.5; cursor:pointer; transition:all .18s ease; filter:drop-shadow(0 2px 3px rgba(21,42,82,.35)); }
  .hotspot text{ fill:#fff; font-family:var(--font-mono); font-size:11px; font-weight:700; pointer-events:none; text-anchor:middle; dominant-baseline:central; }
  .hotspot:hover circle{ fill:var(--teal); r:15; }
  .hotspot.active circle{ fill:var(--coral); r:16; }
  .hotspot.seen circle{ fill:var(--teal); }
  .pulse{ animation:pulseAnim 2s infinite; }
  @keyframes pulseAnim{
    0%{opacity:1;} 50%{opacity:.55;} 100%{opacity:1;}
  }

  .panel-detail h3{
    font-family:var(--font-display);
    font-size:20px; color:var(--navy); margin:0 0 4px;
  }
  .panel-detail .hint{color:var(--slate-soft); font-size:13.5px; line-height:1.6;}
  .term-list{margin-top:14px; display:flex; flex-direction:column; gap:10px;}
  .term-card{
    border:1px solid var(--line);
    background:var(--bg);
    border-radius:12px;
    padding:12px 14px;
  }
  .term-card b{color:var(--navy-2); display:block; font-size:14px; margin-bottom:3px;}
  .term-card span{color:var(--ink); font-size:13.5px; line-height:1.5;}

  .empty-state{
    display:flex; flex-direction:column; align-items:flex-start; justify-content:center;
    min-height:220px; color:var(--slate-soft);
  }
  .empty-state .glyph{font-size:34px; margin-bottom:10px;}

  .footer-note{
    background:var(--teal-soft);
    border:1px solid #bfe6e1;
    color:#0b5c56;
    border-radius:14px;
    padding:14px 18px;
    font-size:13.5px;
    margin-top:22px;
    line-height:1.6;
  }
  .footer-note b{color:#08403c;}

  /* ---------- QUIZ ---------- */
  .quiz-wrap{max-width:760px; margin:0 auto;}
  .quiz-card{
    background:var(--card); border:1px solid var(--line); border-radius:20px;
    padding:28px; position:relative; overflow:hidden;
  }
  .quiz-meta{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
  .quiz-meta .tag{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    background:var(--bg); border:1px solid var(--line); padding:4px 10px; border-radius:8px; color:var(--slate);
  }
  .quiz-q{font-family:var(--font-display); font-size:20px; line-height:1.4; color:var(--navy); margin:6px 0 18px;}
  .quiz-options{display:flex; flex-direction:column; gap:10px;}
  .opt-btn{
    text-align:left; border:1.5px solid var(--line); background:#fff;
    border-radius:12px; padding:13px 16px; font-size:14.5px; color:var(--ink);
    cursor:pointer; transition:all .15s ease; font-family:var(--font-body);
  }
  .opt-btn:hover{border-color:var(--navy-2); background:#f7f9ff;}
  .opt-btn.correct{background:var(--teal-soft); border-color:var(--teal); color:#0b5c56; font-weight:700;}
  .opt-btn.wrong{background:var(--coral-soft); border-color:var(--coral); color:#8c2333; font-weight:700;}
  .opt-btn[disabled]{cursor:default;}
  .quiz-feedback{margin-top:16px; font-size:13.5px; color:var(--slate); min-height:20px;}
  .quiz-actions{display:flex; justify-content:space-between; align-items:center; margin-top:20px;}
  .next-btn{
    background:var(--navy); color:#fff; border:none; border-radius:10px;
    padding:11px 20px; font-weight:700; font-size:13.5px; cursor:pointer;
  }
  .next-btn:disabled{opacity:.35; cursor:not-allowed;}
  .quiz-progress{font-family:var(--font-mono); font-size:12px; color:var(--slate-soft);}

  .result-card{text-align:center; padding:40px 24px;}
  .result-card .big{font-family:var(--font-display); font-size:48px; color:var(--navy);}
  .restart-btn{
    margin-top:18px; background:var(--coral); color:#fff; border:none; border-radius:10px;
    padding:12px 22px; font-weight:700; cursor:pointer; font-size:14px;
  }

  .badge-lvl{
    display:inline-block; font-family:var(--font-mono); font-size:11px; letter-spacing:.08em;
    padding:3px 9px; border-radius:7px; margin-left:8px; vertical-align:middle;
  }
</style>
</head>
<body>

<header class="top">
  <div class="eyebrow"><span class="dot"></span> UCSC · Semiología Clínica</div>
  <h1 class="brand">Neuro-Explorador</h1>
  <p class="brand-sub">Un recorrido interactivo por el Manual de Examen Neurológico del Dr. Jaime Leñero Navarrete. Explora cada estructura en el mapa, revisa su definición y pon a prueba lo aprendido en el quiz final.</p>
  <div class="score-pill">
    <div class="n" id="scoreDisplay">0</div>
    <div class="l">puntos</div>
  </div>
</header>

<nav class="chapters" id="chapterNav"></nav>

<main id="mainArea"></main>

<script>
/* =========================================================
   DATOS — Manual de Examen Neurológico
   ========================================================= */

const CHAPTERS = [
{
  id:0, tag:"Capítulo 1", title:"Examen Mental y Funciones Cognitivas",
  intro:"El examen mental explora el nivel de conciencia y las funciones corticales superiores. Haz clic en cada zona del cerebro para revisar sus contenidos.",
  diagramCaption:"Corte sagital del encéfalo — cada punto se ubica sobre el lóbulo o estructura responsable.",
  hotspots:[
    {x:246,y:298,label:"1"}, {x:270,y:258,label:"2"}, {x:246,y:88,label:"3"},
    {x:108,y:222,label:"4"}, {x:150,y:168,label:"5"}, {x:205,y:185,label:"6"},
    {x:98,y:108,label:"7"}
  ],
  sections:[
    {title:"1 · Conciencia (evaluación cuantitativa)", items:[
      ["Vigil","Plena alerta."],
      ["Obnubilación","Somnolencia; responde a órdenes simples pero con lentitud y distracción."],
      ["Sopor","Paciente dormido. Se divide en Superficial (voz), Medio (tacto) y Profundo (dolor)."],
      ["Coma","Ausencia total de vigilia. No puede ser despertado ni con estímulos dolorosos intensos."]
    ]},
    {title:"2 · Escala de Coma de Glasgow (GCS)", items:[
      ["Ocular","4 espontánea · 3 a la voz · 2 al dolor · 1 nula."],
      ["Verbal","5 orientado · 4 confuso · 3 inapropiado · 2 incomprensible · 1 nula."],
      ["Motor","6 obedece órdenes · 5 localiza dolor · 4 retira al dolor · 3 flexión (decorticación) · 2 extensión (descerebración) · 1 nula."],
      ["Rango total","Puntuación mínima: 3 · Puntuación máxima: 15."]
    ]},
    {title:"3 · Atención y Orientación", items:[
      ["Atención","Capacidad de focalizar la conciencia: inversión de series (meses hacia atrás), Digit Span (repetir números)."],
      ["Orientación Alopsíquica","Tiempo (fecha) y Espacio (lugar)."],
      ["Orientación Autopsíquica","Persona (quién es)."]
    ]},
    {title:"4 · Memoria y Amnesias", items:[
      ["Memoria de Corto Plazo","Recordar 3 palabras tras 5 minutos."],
      ["Memoria de Largo Plazo","Datos generales (presidentes, fechas históricas)."],
      ["Amnesia Anterógrada (fijación)","Incapaz de retener hechos nuevos."],
      ["Amnesia Retrógrada (evocación)","Incapaz de recordar hechos pasados."]
    ]},
    {title:"5 · Examen del Lenguaje", items:[
      ["Afasia de Broca","Motora/Expresión: habla no fluida, comprensión conservada. Lesión en lóbulo frontal izquierdo."],
      ["Afasia de Wernicke","Sensitiva/Comprensión: habla fluida pero incoherente. Lesión en lóbulo temporal posterior."]
    ]},
    {title:"6 · Praxias y Gnosias", items:[
      ["Apraxia Ideatoria","Falla la secuencia (ej. tratar de peinarse con un tenedor)."],
      ["Apraxia Ideomotora","Incapacidad de imitar gestos o ejecutar ante orden verbal."],
      ["Apraxia Constructiva","Incapacidad de copiar dibujos o construir modelos."],
      ["Estereognosia","Reconocer objetos por el tacto con ojos cerrados."],
      ["Grafestesia","Reconocer números o letras dibujados en la palma de la mano."],
      ["Anosognosia","Falta de reconocimiento de la propia enfermedad o déficit (ej. tras un ACV)."]
    ]},
    {title:"7 · Pensamiento y Afectividad", items:[
      ["Circunstancial","Muchos detalles, pero llega al punto."],
      ["Tangencial","No responde lo preguntado directamente."],
      ["Taquipsiquia","Pensamiento acelerado (manía)."],
      ["Ideas Delirantes","Creencias falsas e inamovibles."],
      ["Obsesiones / Fobias","Ideas intrusivas recurrentes / temores irracionales."],
      ["Emoción vs Sentimiento vs Ánimo","Reacción fugaz · estado afectivo estable · estado basal permanente."]
    ]}
  ]
},
{
  id:1, tag:"Capítulo 2", title:"Nervios Craneales (I al XII)",
  intro:"Cada par craneal tiene una función y un método de exploración específico. Recorre el rostro y la base del cráneo para revisarlos.",
  diagramCaption:"Perfil facial — cada punto marca la zona de exploración del par craneal correspondiente.",
  hotspots:[
    {x:274,y:142,label:"1"}, {x:172,y:92,label:"2"}, {x:196,y:72,label:"3"},
    {x:214,y:152,label:"4"}, {x:196,y:196,label:"5"}, {x:238,y:168,label:"6"},
    {x:196,y:262,label:"7"}
  ],
  sections:[
    {title:"1 · NC I — Olfatorio", items:[
      ["Protocolo","Asegurar permeabilidad de fosas, ocluir una fosa y los ojos, presentar sustancia no irritante (café, menta, limón) y comparar entre fosas."],
      ["Anosmia","Pérdida completa (causas: TEC, Parkinson)."],
      ["Hiposmia","Disminución de la sensibilidad olfativa."],
      ["Parosmia","Percepción olfativa distorsionada."],
      ["Cacosmia","Percepción de olores desagradables inexistentes."]
    ]},
    {title:"2 · NC II — Óptico", items:[
      ["Agudeza visual","Tabla de Snellen."],
      ["Campos visuales","Confrontación."],
      ["Fondo de ojo","Papiledema."],
      ["Ceguera monocular","Lesión del nervio óptico."],
      ["Hemianopsia bitemporal","Lesión del quiasma (ej. adenoma hipofisario)."],
      ["Hemianopsia homónima","Lesión retroquiasmática contralateral."]
    ]},
    {title:"3 · NC III, IV y VI — Oculomotilidad", items:[
      ["NC III (Oculomotor)","Inerva casi todos los rectos. Su lesión causa ptosis y ojo hacia afuera/abajo."],
      ["NC IV (Troclear)","Inerva el oblicuo superior. Dificultad para mirar hacia abajo y adentro (ej. bajar escaleras)."],
      ["NC VI (Abducens)","Inerva el recto externo. El ojo no puede abducir (desviación medial)."],
      ["Reflejo Fotomotor / Consensual","Miosis ipsilateral a la luz / Miosis contralateral."],
      ["Anisocoria","Diferencia de tamaño pupilar — siempre patológico."],
      ["Síndrome de Horner","Miosis, Ptosis y Anhidrosis."]
    ]},
    {title:"4 · NC V — Trigémino", items:[
      ["Componente Sensitivo","Ramas V1 (Oftálmica), V2 (Maxilar), V3 (Mandibular). Reflejo corneal: cierre palpebral bilateral."],
      ["Componente Motor","Músculos masticatorios (masetero, temporales). Reflejo mentoniano: percusión sobre el mentón causa ascenso mandibular."]
    ]},
    {title:"5 · NC VII — Facial", items:[
      ["Parálisis Central","Solo afecta el cuadrante inferior de la cara. El paciente puede arrugar la frente."],
      ["Parálisis Periférica","Afecta toda la hemicara. Signo de Bell. El paciente no puede arrugar la frente."],
      ["Sensibilidad","Gusto de los 2/3 anteriores de la lengua."]
    ]},
    {title:"6 · NC VIII — Vestibulococlear", items:[
      ["Prueba de Weber","Lateralización al centro (normal)."],
      ["Prueba de Rinne","Vía aérea > ósea (normal)."],
      ["Romberg","Inestabilidad con ojos cerrados."],
      ["Nistagmus","Movimiento ocular rítmico."]
    ]},
    {title:"7 · Nervios Craneales Inferiores (IX, X, XI, XII)", items:[
      ["NC IX y X","Evaluación del velo del paladar (simetría) y reflejo nauseoso."],
      ["NC XI (Accesorio)","Fuerza del trapecio (encoger hombros) y ECM (rotar cabeza)."],
      ["NC XII (Hipogloso)","Trofismo y motilidad de la lengua. Desviación hacia el lado de la lesión."]
    ]}
  ]
},
{
  id:2, tag:"Capítulo 3", title:"Examen Motor",
  intro:"El examen motor evalúa tono, trofismo, fuerza y reflejos. Explora el cuerpo para revisar cada componente.",
  diagramCaption:"Figura corporal — círculos huecos = articulaciones reflejas; línea punteada = eje de simetría.",
  hotspots:[
    {x:140,y:125,label:"1"}, {x:200,y:225,label:"2"}, {x:100,y:205,label:"3"},
    {x:200,y:140,label:"4"}, {x:212,y:258,label:"5"}, {x:200,y:175,label:"6"}
  ],
  sections:[
    {title:"1 · Tono Muscular: Definiciones", items:[
      ["Espasticidad","Lesión de Motoneurona Superior (MNS). Depende de la velocidad. \"Signo de la navaja\"."],
      ["Rigidez","Disfunción extrapiramidal. Constante. \"Tubo de plomo\" o \"Rueda dentada\" (Parkinson)."],
      ["Hipotonía","Lesión de Motoneurona Inferior (MNI) o Cerebelo. Disminución de resistencia."]
    ]},
    {title:"2 · Trofismo Muscular", items:[
      ["Atrofia","Disminución del volumen muscular. Típica de lesión MNI."],
      ["Hipertrofia","Aumento del volumen (ej. ejercicio o miotonía)."],
      ["Pseudohipertrofia","Reemplazo por tejido graso (Distrofia de Duchenne)."]
    ]},
    {title:"3 · Escala de Fuerza (MRC)", items:[
      ["Grado 0","Parálisis total."],
      ["Grado 1","Contracción visible sin movimiento."],
      ["Grado 2","Movimiento en plano horizontal (sin gravedad)."],
      ["Grado 3","Movimiento contra gravedad."],
      ["Grado 4","Contra gravedad y resistencia parcial."],
      ["Grado 5","Contra resistencia máxima — fuerza normal."]
    ]},
    {title:"4 · Terminología Clínica", items:[
      ["Hemiplejia","Parálisis de un hemicuerpo (derecho o izquierdo)."],
      ["Paraplejia","Parálisis de ambas extremidades inferiores."],
      ["Cuadriplejia","Parálisis de las cuatro extremidades."],
      ["Sufijos","-plejia (total) | -paresia (parcial)."]

    {title:"5 · Reflejos Profundos (ROT)", items:[
      ["Bicipital","Nivel segmentario C5–C6."],
      ["Tricipital","Nivel segmentario C6–C7."],
      ["Rotuliano / Patelar","Nivel segmentario L3–L4."],
      ["Aquiliano","Nivel segmentario S1."],
      ["Graduación","0 arreflexia · + hiporreflexia · ++ normorreflexia · +++ hiperreflexia (vivo) · ++++ clonus."]
    ]},
    {title:"6 · Reflejos Superficiales", items:[
      ["Cutáneo-Abdominal","Desviación del ombligo al estímulo (T7–T11)."],
      ["Cremasteriano","Elevación testicular (L1)."],
      ["Reflejo Plantar","Respuesta normal es la flexión."],
      ["Signo de Babinski","Extensión del primer ortejo. Indica lesión de la vía piramidal."]
    ]}
  ]
},
{
  id:3, tag:"Capítulo 4", title:"Sensibilidad",
  intro:"La sensibilidad se explora en su componente superficial y se interpreta según grandes síndromes topográficos.",
  diagramCaption:"Silueta corporal (izq.) y corte transversal medular con sus tractos (der.).",
  hotspots:[
    {x:95,y:150,label:"1"}, {x:270,y:180,label:"2"}
  ],
  sections:[
    {title:"1 · Sensibilidad Superficial (Exteroceptiva)", items:[
      ["Táctil","Pinceladas suaves con algodón. El paciente indica dónde siente."],
      ["Dolorosa","Uso de aguja estéril. Discriminación entre \"punta\" y \"romo\"."],
      ["Térmica","Tubos con agua fría y caliente. Poco habitual en el examen de rutina."]
    ]},
    {title:"2 · Grandes Síndromes Sensitivos", items:[
      ["Síndrome de Brown-Séquard","Hemisección medular. Ipsilateral: motor y propiocepción. Contralateral: dolor y temperatura."],
      ["Síndrome Cordonal Posterior","Pérdida de vibración y posición. Ataxia sensorial."],
      ["Síndrome Tabético","Sífilis terciaria. Dolores lancinantes y ataxia."]
    ]}
  ]
},
{
  id:4, tag:"Capítulo 5", title:"Examen Cerebeloso",
  intro:"El cerebelo coordina el movimiento voluntario. Su disfunción produce hallazgos característicos y muy reconocibles.",
  diagramCaption:"Cerebelo (vista posterior) con las pruebas de coordinación asociadas.",
  hotspots:[
    {x:75,y:70,label:"1"}, {x:325,y:70,label:"2"}, {x:200,y:255,label:"3"}
  ],
  sections:[
    {title:"1 · Dismetría", items:[
      ["Índice-Nariz / Talón-Rodilla","El paciente \"pasa de largo\" o tiembla al llegar al objetivo."]

function shuffled(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function chapterCompletion(chIdx){
  const ch = CHAPTERS[chIdx];
  let seenCount = 0;
  ch.sections.forEach((s,i)=>{ if(state.seen.has(chIdx+"-"+i)) seenCount++; });
  return {seen:seenCount, total:ch.sections.length};
}

/* =========================================================
   RENDER: NAV
   ========================================================= */
function renderNav(){
  const nav = document.getElementById('chapterNav');
  nav.innerHTML = "";
  CHAPTERS.forEach((ch,i)=>{
    const c = chapterCompletion(i);
    const btn = document.createElement('button');
    btn.className = 'ch-btn' + (state.view==="chapter" && state.currentChapter===i ? ' active':'') + (c.seen===c.total ? ' done':'');
    btn.innerHTML = `<span class="num">${i+1}</span> ${ch.title.split('(')[0].trim()}`;
    btn.onclick = ()=>{ state.view="chapter"; state.currentChapter=i; render(); };
    nav.appendChild(btn);
  });
  const quizBtn = document.createElement('button');
  quizBtn.className = 'ch-btn quiz-btn' + (state.view==="quiz" ? ' active':'');
  quizBtn.innerHTML = `🧠 Quiz Final`;
  quizBtn.onclick = ()=>{ startQuiz(); };
  nav.appendChild(quizBtn);
}

/* =========================================================
   RENDER: DIAGRAM (SVG genérico con hotspots)
   ========================================================= */
function buildDiagramSVG(chIdx){
  const ch = CHAPTERS[chIdx];
  const bgShapes = DIAGRAM_ART[chIdx] || "";
  let hotspotsSVG = "";
  ch.hotspots.forEach((h,i)=>{
    const key = chIdx+"-"+i;
    const isSeen = state.seen.has(key);
    const isActive = state.activeSection===i;
    hotspotsSVG += `
      <g class="hotspot ${isActive?'active':''} ${isSeen?'seen':''}" data-i="${i}" onclick="selectSection(${chIdx},${i})">
        <circle cx="${h.x}" cy="${h.y}" r="14" class="${!isSeen?'pulse':''}"/>
        <text x="${h.x}" y="${h.y+1}">${h.label}</text>
      </g>`;
  });
  return `<svg class="diagram" viewBox="0 0 400 340" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 Z" fill="#9fb0d6"/>
      </marker>
    </defs>
    ${bgShapes}
    ${hotspotsSVG}
  </svg>`;
}

/* =========================================================
   RENDER: CHAPTER VIEW
   ========================================================= */
function renderChapter(){
  const chIdx = state.currentChapter;
  const ch = CHAPTERS[chIdx];
  const c = chapterCompletion(chIdx);
  const main = document.getElementById('mainArea');

  const activeIdx = state.activeSection;
  const activeSection = (activeIdx!==undefined && activeIdx!==null) ? ch.sections[activeIdx] : null;

  main.innerHTML = `
    <div class="chapter-head">
      <div class="kicker">${ch.tag} · ${c.seen}/${c.total} explorado${c.seen===1?'':'s'}</div>
      <h2>${ch.title}</h2>
      <p>${ch.intro}</p>
      <div class="progress-track"><div class="progress-fill" style="width:${(c.seen/c.total)*100}%"></div></div>
    </div>
    <div class="split">
      <div class="panel panel-diagram">
        ${buildDiagramSVG(chIdx)}
        <div class="diagram-caption">${ch.diagramCaption}</div>
      </div>
      <div class="panel panel-detail" id="detailPanel">
        ${activeSection ? renderSectionDetail(activeSection) : renderEmptyState()}
      </div>
    </div>
    ${ch.summary ? renderSummary(ch.summary) : ""}
  `;
}

function renderEmptyState(){
  return `
    <div class="empty-state">
      <div class="glyph">🖱️</div>
      <div><b style="color:var(--navy)">Selecciona un punto del mapa</b></div>
      <div style="margin-top:6px;">Haz clic en cualquiera de los números para revisar su definición clínica aquí.</div>
    </div>`;
}

function renderSectionDetail(section){
  let itemsHTML = section.items.map(([term,def])=>`
    <div class="term-card"><b>${term}</b><span>${def}</span></div>
  `).join("");
  return `
    <h3>${section.title}</h3>
    <div class="hint">Toca otra estructura del mapa para seguir explorando este capítulo.</div>
    <div class="term-list">${itemsHTML}</div>
  `;
}

function renderSummary(summary){
  const steps = summary.steps.map((s,i)=>`<div class="term-card"><b>${i+1}. ${s}</b></div>`).join("");
  return `
    <div class="panel" style="margin-top:20px;">
      <h3 style="font-family:var(--font-display); color:var(--navy); margin-top:0;">${summary.title}</h3>
      <div class="term-list" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr));">${steps}</div>
      <div class="footer-note"><b>${summary.pearl}</b></div>
    </div>
  `;
}

function selectSection(chIdx, sIdx){
  state.currentChapter = chIdx;
  const key = chIdx+"-"+sIdx;
  if(!state.seen.has(key)){
    state.seen.add(key);
    state.score += 5;
  }
  state.activeSection = sIdx;
  render();
}

/* =========================================================
   QUIZ
   ========================================================= */
function startQuiz(){
  state.view = "quiz";
  state.quizOrder = shuffled(QUIZ_BANK.map((_,i)=>i)).slice(0, 12);
  state.quizIndex = 0;
  state.quizScore = 0;
  state.answered = false;
  render();
}

function renderQuiz(){
  const main = document.getElementById('mainArea');
  if(state.quizIndex >= state.quizOrder.length){
    renderQuizResult();
    return;
  }
  const qData = QUIZ_BANK[state.quizOrder[state.quizIndex]];
  const opts = qData.options.map((opt,i)=>`
    <button class="opt-btn" data-i="${i}" onclick="answerQuiz(${i})">${opt}</button>
  `).join("");

  main.innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-card">
        <div class="quiz-meta">
          <span class="tag">Pregunta ${state.quizIndex+1} / ${state.quizOrder.length}</span>
          <span class="tag">Puntaje: ${state.quizScore}</span>
        </div>
        <div class="quiz-q">${qData.q}</div>
        <div class="quiz-options" id="quizOptions">${opts}</div>
        <div class="quiz-feedback" id="quizFeedback"></div>
        <div class="quiz-actions">
          <span class="quiz-progress">MEDLINE-STYLE MCQ · manual UCSC</span>
          <button class="next-btn" id="nextBtn" disabled onclick="nextQuiz()">Siguiente →</button>
        </div>
      </div>
    </div>
  `;
}

function answerQuiz(i){
  if(state.answered) return;
  state.answered = true;
  const qData = QUIZ_BANK[state.quizOrder[state.quizIndex]];
  const buttons = document.querySelectorAll('#quizOptions .opt-btn');
  buttons.forEach((b,idx)=>{
    b.disabled = true;
    if(idx===qData.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const feedback = document.getElementById('quizFeedback');
  if(i===qData.a){
    state.quizScore += 10;
    state.score += 10;
    feedback.innerHTML = "✅ ¡Correcto! Bien identificado.";
  } else {
    feedback.innerHTML = "❌ No es correcto. Revisa la opción resaltada en verde.";
  }
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('scoreDisplay').textContent = state.score;
}

function nextQuiz(){
  state.quizIndex += 1;
  state.answered = false;
  render();
}

function renderQuizResult(){
  const main = document.getElementById('mainArea');
  const total = state.quizOrder.length * 10;
  const pct = Math.round((state.quizScore/total)*100);
  let level = "Sigue repasando";
  let color = "var(--coral)";
  if(pct>=80){ level="Nivel Interno de Neurología"; color="var(--teal)"; }
  else if(pct>=50){ level="Buen manejo semiológico"; color="var(--amber)"; }

  main.innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-card result-card">
        <div class="eyebrow" style="justify-content:center; color:var(--slate);">Resultado final</div>
        <div class="big">${pct}%</div>
        <p style="color:var(--slate); font-size:14.5px;">${state.quizScore} de ${total} puntos posibles.</p>
        <span class="badge-lvl" style="background:${color}22; color:${color};">${level}</span>
        <div>
          <button class="restart-btn" onclick="startQuiz()">Repetir Quiz</button>
        </div>
      </div>
    </div>
  `;
}

/* =========================================================
   RENDER MASTER
   ========================================================= */
function render(){
  renderNav();
  document.getElementById('scoreDisplay').textContent = state.score;
  if(state.view==="quiz"){
    renderQuiz();
  } else {
    renderChapter();
  }
}

render();
</script>
