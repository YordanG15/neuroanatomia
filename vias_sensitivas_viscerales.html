<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Interactivo · Vías Sensitivas Viscerales</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --void:#0a0c11;
  --panel:#12151c;
  --panel-alt:#181c25;
  --hair: rgba(255,255,255,0.08);
  --ink:#eef0f3;
  --ink-dim:#8b93a4;
  --ink-faint:#565d6c;
  --simp:#e2493c;    /* simpático / nocicepción / alarma */
  --para:#42b788;    /* parasimpático / reflejo */
  --somatic:#e3b23c; /* fibra somática / referido */
  --neo:#f2924a;     /* neoespinotalámico */
  --pbr:#9d80e6;     /* espinoparabraquial */
  --dorsal:#4d9fe0;  /* columna dorsal postsináptica */
  --font-d:'Space Grotesk', sans-serif;
  --font-b:'Inter', sans-serif;
  --font-m:'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--void);color:var(--ink);font-family:var(--font-b);}
::selection{background:var(--simp);color:#fff;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#2a2f3a;border-radius:4px;}

a{color:inherit;}

.app{display:grid;grid-template-columns:66px 260px 1fr;min-height:100vh;}
@media (max-width: 980px){ .app{grid-template-columns:1fr;} .rail,.sidebar{display:none;} .mobile-nav{display:flex !important;} }

/* ---------- signature rail: segmental spinal levels ---------- */
.rail{
  border-right:1px solid var(--hair);
  background:linear-gradient(180deg,#0d1016,#0a0c11);
  padding:20px 0;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  position:sticky;top:0;height:100vh;
}
.rail-title{writing-mode:vertical-rl;text-orientation:mixed;font-family:var(--font-m);font-size:10px;letter-spacing:.14em;color:var(--ink-faint);margin-bottom:14px;text-transform:uppercase;}
.rail-seg{
  font-family:var(--font-m);font-size:9.5px;color:var(--ink-faint);
  width:34px;height:15px;display:flex;align-items:center;justify-content:center;
  border-radius:3px;transition:all .35s ease;position:relative;
}
.rail-seg.on{color:#fff;font-weight:600;box-shadow:0 0 12px 1px var(--seg-color, var(--simp)); background:var(--seg-color, var(--simp));}
.rail-group-gap{height:8px;}

/* ---------- sidebar ---------- */
.sidebar{
  border-right:1px solid var(--hair);
  padding:22px 14px 30px;
  overflow-y:auto;height:100vh;position:sticky;top:0;
}
.brand{padding:2px 8px 18px;border-bottom:1px solid var(--hair);margin-bottom:14px;}
.brand .eyebrow{font-family:var(--font-m);font-size:10px;color:var(--simp);letter-spacing:.14em;text-transform:uppercase;}
.brand h1{font-family:var(--font-d);font-size:19px;line-height:1.15;margin:6px 0 4px;font-weight:700;}
.brand .sub{font-size:11.5px;color:var(--ink-dim);}

.navgroup-label{font-family:var(--font-m);font-size:9.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.12em;margin:16px 8px 6px;}
.navitem{
  display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;
  font-size:13px;color:var(--ink-dim);transition:background .15s,color .15s;margin-bottom:1px;
}
.navitem:hover{background:var(--panel-alt);color:var(--ink);}
.navitem.active{background:var(--panel-alt);color:#fff;}
.navitem .num{font-family:var(--font-m);font-size:10.5px;color:var(--ink-faint);width:20px;flex-shrink:0;}
.navitem.active .num{color:var(--dot,var(--simp));}
.navitem .dot{width:6px;height:6px;border-radius:50%;background:var(--dot,var(--ink-faint));flex-shrink:0;}

/* ---------- main ---------- */
.main{padding:34px 42px 80px;max-width:1180px;overflow-x:hidden;}
.crumb{font-family:var(--font-m);font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;}
.headline{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:4px;}
h2.title{font-family:var(--font-d);font-size:32px;margin:0;font-weight:700;letter-spacing:-.01em;}
.tag{font-family:var(--font-m);font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid currentColor;color:var(--tagcolor,var(--simp));}
p.lead{color:var(--ink-dim);font-size:15px;max-width:760px;line-height:1.6;margin:10px 0 30px;}

.split{display:grid;grid-template-columns:minmax(280px,380px) 1fr;gap:30px;align-items:start;}
@media (max-width:760px){.split{grid-template-columns:1fr;}}
.diagram-card{
  background:var(--panel);border:1px solid var(--hair);border-radius:16px;padding:18px 16px 22px;
  position:sticky; top:20px;
}
.diagram-card .cap{font-family:var(--font-m);font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.chain-svg, .schem-svg{width:100%;height:auto;display:block;}
.node-label{font-family:var(--font-b);font-size:11.5px;font-weight:600;}
.node-sub{font-family:var(--font-m);font-size:9px;}

.info-col{display:flex;flex-direction:column;gap:16px;}
.card{background:var(--panel);border:1px solid var(--hair);border-radius:14px;padding:18px 20px;}
.card h3{font-family:var(--font-d);font-size:14.5px;margin:0 0 10px;color:var(--card-accent,#fff);display:flex;align-items:center;gap:8px;}
.card h3::before{content:'';width:7px;height:7px;border-radius:2px;background:var(--card-accent,var(--simp));display:inline-block;}
.card p, .card li{font-size:13.6px;line-height:1.65;color:#d5d8de;margin:0;}
.card ul{margin:0;padding-left:18px;display:flex;flex-direction:column;gap:6px;}
.card b{color:#fff;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media (max-width:560px){.grid2{grid-template-columns:1fr;}}

.callout{border-left:3px solid var(--acc,var(--simp));background:linear-gradient(90deg, color-mix(in srgb, var(--acc,var(--simp)) 10%, transparent), transparent);padding:12px 16px;border-radius:0 10px 10px 0;font-size:13.4px;color:#e4e6ea;}
.callout b{color:var(--acc,var(--simp));}

.pillrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px;}
.pill{font-family:var(--font-m);font-size:11px;padding:5px 10px;border-radius:20px;background:var(--panel-alt);border:1px solid var(--hair);color:var(--ink-dim);}

table.datatable{width:100%;border-collapse:collapse;font-size:13px;}
table.datatable th{text-align:left;font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);padding:8px 10px;border-bottom:1px solid var(--hair);}
table.datatable td{padding:11px 10px;border-bottom:1px solid var(--hair);vertical-align:top;color:#d5d8de;}
table.datatable tr:hover td{background:var(--panel-alt);}
.rowdot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:7px;}

.footnav{display:flex;justify-content:space-between;margin-top:44px;gap:14px;}
.navbtn{font-family:var(--font-m);font-size:12px;background:var(--panel);border:1px solid var(--hair);border-radius:10px;padding:12px 18px;cursor:pointer;color:var(--ink);display:flex;align-items:center;gap:8px;transition:border-color .15s;}
.navbtn:hover{border-color:var(--ink-dim);}
.navbtn:disabled{opacity:.3;cursor:default;}
.navbtn span.small{color:var(--ink-faint);font-size:10px;display:block;text-transform:uppercase;}

.mobile-nav{display:none;position:sticky;top:0;z-index:20;background:var(--void);border-bottom:1px solid var(--hair);padding:10px 14px;align-items:center;gap:10px;}
.mobile-nav select{flex:1;background:var(--panel);color:var(--ink);border:1px solid var(--hair);border-radius:8px;padding:8px;font-family:var(--font-b);}

/* quiz */
.quiz-box{background:var(--panel);border:1px solid var(--hair);border-radius:16px;padding:26px;max-width:640px;}
.quiz-progress{display:flex;gap:4px;margin-bottom:18px;}
.quiz-progress i{flex:1;height:4px;border-radius:2px;background:#242833;}
.quiz-progress i.done{background:var(--simp);}
.quiz-q{font-family:var(--font-d);font-size:18px;margin-bottom:18px;line-height:1.4;}
.quiz-opt{display:block;width:100%;text-align:left;background:var(--panel-alt);border:1px solid var(--hair);color:var(--ink);padding:13px 16px;border-radius:10px;margin-bottom:9px;cursor:pointer;font-size:13.8px;font-family:var(--font-b);transition:all .15s;}
.quiz-opt:hover{border-color:var(--ink-dim);}
.quiz-opt.correct{border-color:var(--para);background:rgba(66,183,136,.14);color:#fff;}
.quiz-opt.wrong{border-color:var(--simp);background:rgba(226,73,60,.14);color:#fff;}
.quiz-opt:disabled{cursor:default;}
.quiz-explain{font-size:13px;color:var(--ink-dim);margin-top:14px;padding-top:14px;border-top:1px solid var(--hair);line-height:1.6;}
.quiz-footer{display:flex;justify-content:space-between;align-items:center;margin-top:20px;}
.score-badge{font-family:var(--font-m);font-size:12px;color:var(--ink-dim);}
.btn{font-family:var(--font-m);font-size:12.5px;background:var(--simp);color:#fff;border:none;border-radius:9px;padding:11px 20px;cursor:pointer;}
.btn:hover{filter:brightness(1.1);}
.result-screen{text-align:center;padding:30px 10px;}
.result-screen .big{font-family:var(--font-d);font-size:52px;font-weight:700;}

/* compare */
.compare-select{display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
.compare-select select{background:var(--panel);border:1px solid var(--hair);color:var(--ink);padding:10px 14px;border-radius:10px;font-family:var(--font-b);font-size:13.5px;min-width:220px;}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media (max-width:700px){.compare-grid{grid-template-columns:1fr;}}
.compare-card{border-radius:14px;padding:20px;border:1px solid var(--hair);background:var(--panel);}
.compare-card h4{font-family:var(--font-d);font-size:16px;margin:0 0 14px;color:var(--c-accent,#fff);}
.compare-row{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--hair);font-size:13px;}
.compare-row .k{color:var(--ink-faint);font-family:var(--font-m);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;width:110px;flex-shrink:0;}
.compare-row .v{color:#e2e4e9;text-align:right;}

.toc-list{display:flex;flex-direction:column;gap:8px;}
.toc-item{display:flex;gap:12px;align-items:center;padding:10px 12px;border-radius:10px;background:var(--panel-alt);font-size:13px;cursor:pointer;}
.toc-item:hover{outline:1px solid var(--hair);}
.toc-item .n{font-family:var(--font-m);color:var(--ink-faint);font-size:11px;width:16px;}

.legend-row{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--font-m);font-size:10.5px;color:var(--ink-dim);margin-top:10px;}
.legend-row span{display:flex;align-items:center;gap:6px;}
.legend-row i{width:9px;height:9px;border-radius:2px;display:inline-block;}

/* ---------- interactivity: hot elements + tooltip ---------- */
.hot{cursor:pointer;}
.hot:hover{ filter:brightness(1.35); }
.hot:focus{outline:none;}
.hint-line{font-family:var(--font-m);font-size:10px;color:var(--ink-faint);display:flex;align-items:center;gap:6px;margin-top:10px;}
.hint-line::before{content:'◎';color:var(--simp);}

#tooltip{
  position:fixed;z-index:200;max-width:260px;background:#1b1f28;border:1px solid var(--hair);border-radius:12px;
  padding:14px 16px;box-shadow:0 18px 40px rgba(0,0,0,.5);opacity:0;transform:translateY(6px) scale(.98);
  pointer-events:none;transition:opacity .16s ease, transform .16s ease;
}
#tooltip.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
#tooltip .tt-title{font-family:var(--font-d);font-size:13.5px;font-weight:700;color:var(--tt-c,#fff);margin-bottom:6px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
#tooltip .tt-desc{font-size:12.5px;line-height:1.55;color:#cfd3da;}
#tooltip .tt-close{font-family:var(--font-m);font-size:13px;color:var(--ink-faint);cursor:pointer;line-height:1;}
#tooltip .tt-close:hover{color:#fff;}
#tooltip::before{content:'';position:absolute;left:18px;bottom:-6px;width:11px;height:11px;background:#1b1f28;border-right:1px solid var(--hair);border-bottom:1px solid var(--hair);transform:rotate(45deg);}

/* diagram toolbar (toggles / playback) */
.diagram-toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.toggle-btn{font-family:var(--font-m);font-size:10.5px;background:var(--panel-alt);border:1px solid var(--hair);color:var(--ink-dim);padding:6px 10px;border-radius:20px;cursor:pointer;transition:all .15s;}
.toggle-btn.active{color:#fff;border-color:var(--tb-c,var(--simp));background:color-mix(in srgb, var(--tb-c,var(--simp)) 22%, transparent);}
.play-btn{font-family:var(--font-m);font-size:11px;background:var(--panel-alt);border:1px solid var(--hair);color:var(--ink);padding:8px 14px;border-radius:20px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;margin-top:12px;transition:all .15s;}
.play-btn:hover{border-color:var(--ink-dim);}
.play-btn:active{transform:scale(.97);}
.race-readout{font-family:var(--font-m);font-size:10px;color:var(--ink-faint);margin-top:6px;min-height:14px;}
</style>
</head>
<body>
<div class="app">

  <!-- SIGNATURE RAIL: segmental levels -->
  <div class="rail" id="rail"></div>

  <!-- SIDEBAR NAV -->
  <div class="sidebar">
    <div class="brand">
      <div class="eyebrow">Neuroanatomía · Aferencias</div>
      <h1>Vías Sensitivas Viscerales</h1>
      <div class="sub">Atlas interactivo · basado en la clase del Dr. J. Leñero, UCSC</div>
    </div>
    <div id="navlist"></div>
  </div>

  <!-- MOBILE NAV -->
  <div class="mobile-nav">
    <select id="mobileSelect"></select>
  </div>

  <!-- MAIN -->
  <div class="main" id="main"></div>
</div>

<div id="tooltip"></div>

<script>
/* =========================================================================
   DATA MODEL
   ========================================================================= */
const C = { simp:'#e2493c', para:'#42b788', somatic:'#e3b23c', neo:'#f2924a', pbr:'#9d80e6', dorsal:'#4d9fe0', mix:'#9399a8' };

// segmental level rail groups (for the signature element)
const LEVELS = ['C1','C2','C3','C4','C5','C6','C7','C8','T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12','L1','L2','L3','L4','L5','S1','S2','S3','S4','S5'];

/* =========================================================================
   INTERACTIVE TOOLTIP SYSTEM — every "hot" structure in a diagram is clickable
   ========================================================================= */
function showTip(x, y, title, desc, color){
  const tip = document.getElementById('tooltip');
  tip.style.setProperty('--tt-c', color || '#fff');
  tip.innerHTML = `<div class="tt-title"><span>${title}</span><span class="tt-close">×</span></div><div class="tt-desc">${desc}</div>`;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = x + 16, top = y + 16;
  tip.style.left = '0px'; tip.style.top='0px'; tip.classList.add('show');
  requestAnimationFrame(()=>{
    const r = tip.getBoundingClientRect();
    if(left + r.width > vw - 12) left = x - r.width - 16;
    if(top + r.height > vh - 12) top = y - r.height - 16;
    if(left<8) left=8; if(top<8) top=8;
    tip.style.left = left+'px'; tip.style.top = top+'px';
  });
  tip.querySelector('.tt-close').addEventListener('click', hideTip);
}
function hideTip(){ document.getElementById('tooltip').classList.remove('show'); }

document.addEventListener('click', (e)=>{
  const hot = e.target.closest('.hot');
  if(hot){
    const t = hot.dataset.t, d = hot.dataset.d, c = hot.dataset.c || '#fff';
    if(t){ showTip(e.clientX, e.clientY, t, d, c); return; }
  }
  if(!e.target.closest('#tooltip')) hideTip();
});
window.addEventListener('scroll', hideTip, true);

/* ---------- generic vertical "chain" SVG builder (organ -> cortex) ---------- */
let __svgUid = 0;
function chainSVG(nodes, accent){
  const uid = 'ch'+(__svgUid++);
  const w=340, nodeH=58, gap=24, padTop=28, padBot=28;
  const totalH = padTop+padBot+ nodes.length*nodeH + (nodes.length-1)*gap;
  const cx = w/2;
  let y = totalH - padBot - nodeH/2;
  const pos = [];
  nodes.forEach(()=>{ pos.push(y); y -= (nodeH+gap); });
  let arrows='', items='', pulses='';
  nodes.forEach((n,i)=>{
    const cy = pos[i];
    const on = n.active !== false;
    const fillOpacity = on ? '26':'10';
    const stroke = on ? accent : '#333a46';
    const labelColor = on ? '#ffffff' : '#5a6170';
    const subColor = on ? accent : '#454b58';
    const tip = (n.detail || n.sub || '').replace(/"/g,'&quot;');
    items += `<g class="hot" tabindex="0" data-t="${(n.label||'').replace(/"/g,'&quot;')}" data-d="${tip}" data-c="${accent}">
      <rect x="${cx-140}" y="${cy-27}" width="280" height="54" rx="12" fill="${accent}${fillOpacity}" stroke="${stroke}" stroke-width="1.4"/>
      <circle cx="${cx-124}" cy="${cy}" r="4.5" fill="${on?accent:'#3a4150'}"/>
      <text x="${cx}" y="${cy-4}" text-anchor="middle" class="node-label" fill="${labelColor}">${n.label}</text>
      ${n.sub ? `<text x="${cx}" y="${cy+15}" text-anchor="middle" class="node-sub" fill="${subColor}">${n.sub}</text>` : ''}
      <text x="${cx+124}" y="${cy+3}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" fill="${on?accent:'#454b58'}" opacity="0.85">＋</text>
    </g>`;
    if(i < nodes.length-1){
      const cy2 = pos[i+1];
      const pid = `${uid}p${i}`;
      arrows += `<line x1="${cx}" y1="${cy-27}" x2="${cx}" y2="${cy2+29}" stroke="${accent}" stroke-width="2" marker-end="url(#arrow-${uid})" opacity="0.6"/>`;
      pulses += `<circle r="4" fill="${accent}" style="filter:drop-shadow(0 0 4px ${accent})">
        <animateMotion dur="1.6s" begin="${i*0.35}s" repeatCount="indefinite"
          path="M ${cx},${cy-30} L ${cx},${cy2+30}"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.85;1" dur="1.6s" begin="${i*0.35}s" repeatCount="indefinite"/>
      </circle>`;
    }
  });
  return `<svg viewBox="0 0 ${w} ${totalH}" class="chain-svg" xmlns="http://www.w3.org/2000/svg">
    <defs><marker id="arrow-${uid}" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="${accent}"/></marker></defs>
    ${arrows}${items}${pulses}
    <text x="${cx}" y="${totalH-8}" text-anchor="middle" font-family="IBM Plex Mono" font-size="8.5" fill="#454b58">PERIFERIA → CORTEZA (ascendente) · toca "＋" para el detalle</text>
  </svg>`;
}

/* ---------- spinal cord cross-section with Rexed laminae ---------- */
const LAMINA_INFO = {
  I:   {name:'Lámina I · núcleo marginal',        d:'Recibe fibras Aδ y C nociceptivas. Origen del tracto neoespinotalámico: dolor agudo y bien localizado.'},
  V:   {name:'Lámina V · zona de convergencia',   d:'Neurona de "amplio rango dinámico": recibe simultáneamente fibra visceral y fibra somática (piel). Es la base anatómica del dolor referido.'},
  VII: {name:'Láminas VII–VIII · zona intermedia',d:'Procesa reflejos autonómicos segmentarios y proyecta hacia el tracto espinorreticular (dolor difuso y alerta).'},
  X:   {name:'Lámina X · comisural',              d:'Rodea el canal central; recibe aferencias viscerales bilaterales y participa en la vía espinoparabraquial.'},
};
function cordSVG(highlight, accent, opts={}){
  highlight = highlight || [];
  const uid = 'cd'+(__svgUid++);
  const on = id => highlight.includes(id);
  const pts = {
    I:   {x:150,y:50},
    V:   {x:150,y:80},
    VII: {x:124,y:118},
    X:   {x:150,y:150},
  };
  let dots='';
  Object.entries(pts).forEach(([id,p])=>{
    const active = on(id);
    const info = LAMINA_INFO[id];
    dots += `<g class="hot" tabindex="0" data-t="${info.name}" data-d="${info.d}" data-c="${accent}">
      <circle cx="${p.x}" cy="${p.y}" r="13" fill="transparent"/>
      <circle cx="${p.x}" cy="${p.y}" r="${active?6.5:4.5}" fill="${active?accent:'#3a4150'}" ${active?`style="filter:drop-shadow(0 0 6px ${accent})"`:''}>
        ${active?`<animate attributeName="r" values="6.5;8;6.5" dur="1.8s" repeatCount="indefinite"/>`:''}
      </circle>
      <text x="${p.x + (p.x>=150?16:-16)}" y="${p.y+4}" font-family="IBM Plex Mono" font-size="9.5" font-weight="600" fill="${active?'#fff':'#5a6170'}" text-anchor="${p.x>=150?'start':'end'}">${id}</text>
    </g>`;
  });
  const dorsalCol = opts.dorsalTract ? accent : '#333a46';
  const anterolatCol = opts.anterolateral ? accent : '#333a46';
  const dPulse = opts.dorsalTract ? `<circle r="4.5" fill="${accent}" style="filter:drop-shadow(0 0 5px ${accent})">
      <animateMotion dur="1.8s" repeatCount="indefinite" path="M185,105 L150,80 A105,105 0 0,1 ${uid?190:190},60 L150,14"/>

/* ---------- reusable four-module horizontal flow (síntesis) ---------- */
function modulesSVG(mods, accent){

      <text x="${x+boxW/2}" y="${y+22}" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="${accent}">MÓD. ${i+1}</text>
      <text x="${x+boxW/2}" y="${y+38}" text-anchor="middle" class="node-label" font-size="10.5" fill="#fff">${m.t}</text>
      <text x="${x+boxW/2}" y="${y+52}" text-anchor="middle" font-family="IBM Plex Mono" font-size="7.8" fill="#9399a8">${m.s}</text>

    if(col===0 && i+1<mods.length){

    }
  });
  return `<svg viewBox="0 0 ${w} 190" class="schem-svg" xmlns="http://www.w3.org/2000/svg">${arrows}${rows}</svg>`;
}

function updateRail(section){

  document.querySelectorAll('.rail-seg').forEach(el=>{

function renderDiagram(section){
  if(!section.diagram) return '';
  const d = section.diagram;
  let inner = '', toolbar='', hint='<div class="hint-line">Toca cualquier estructura para ver su detalle.</div>';
  if(d.type === 'chain') inner = chainSVG(d.nodes, section.accent);
  else if(d.type === 'cord') inner = cordSVG(d.highlight, section.accent, d.opts||{});
  else if(d.type === 'bodypaths'){
    inner = bodyPathsSVG();
    toolbar = `<div class="diagram-toolbar" id="bodyToolbar" style="--tb-c:${section.accent}">
      <button class="toggle-btn active" data-layer="all">Ambos</button>
      <button class="toggle-btn" data-layer="simp" style="--tb-c:${C.simp}">Simpático</button>
      <button class="toggle-btn" data-layer="para" style="--tb-c:${C.para}">Parasimpático</button>
    </div>`;
  }
  return `<div class="diagram-card">${toolbar}<div class="cap">Modelo 2D esquemático · estructuras rotuladas</div>${inner}${hint}</div>`;
}

function initCompare(){

  a.value = 'neo'; b.value = 'reticular';
  const draw = ()=>{
    const pa = PATHS.find(p=>p.id===a.value), pb = PATHS.find(p=>p.id===b.value);
    document.getElementById('cmpGrid').innerHTML = [pa,pb].map(p=>`

/* ---------- quiz game ---------- */
let quizOrder = [], quizIdx = 0, quizScore = 0;
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

function initQuiz(){
  quizOrder = shuffle(QUIZ.map((_,i)=>i));
  quizIdx = 0; quizScore = 0;
  renderQuizQuestion();
}

function renderQuizQuestion(){
  const box = document.getElementById('quizBox');
  if(quizIdx >= quizOrder.length){
    const pct = Math.round((quizScore/quizOrder.length)*100);
    box.innerHTML = `<div class="result-screen">
      <div class="big" style="color:${pct>=70?C.para:C.simp}">${quizScore}/${quizOrder.length}</div>
      <p style="color:var(--ink-dim);margin:10px 0 22px">${pct>=70? '¡Buen dominio de las vías viscerales!' : 'Repasa las secciones marcadas en rojo y vuelve a intentarlo.'}</p>
      <button class="btn" id="restartQuiz">Reintentar</button>
    </div>`;
    document.getElementById('restartQuiz').addEventListener('click', initQuiz);
    return;
  }
  const qi = quizOrder[quizIdx];
  const q = QUIZ[qi];
  box.innerHTML = `
    <div class="quiz-progress">${quizOrder.map((_,i)=>`<i class="${i<quizIdx?'done':''}"></i>`).join('')}</div>
    <div class="score-badge" style="margin-bottom:10px">Pregunta ${quizIdx+1} de ${quizOrder.length} · Puntaje: ${quizScore}</div>
    <div class="quiz-q">${q.q}</div>
    <div id="quizOpts">${q.opts.map((o,i)=>`<button class="quiz-opt" data-i="${i}">${o}</button>`).join('')}</div>
    <div id="quizExplainSlot"></div>
    <div class="quiz-footer"><span></span><button class="btn" id="quizNext" style="display:none">Siguiente →</button></div>
  `;
  const opts = box.querySelectorAll('.quiz-opt');
  opts.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      opts.forEach(b=>b.disabled=true);
      const chosen = parseInt(btn.dataset.i);
      if(chosen === q.a){ btn.classList.add('correct'); quizScore++; }
      else{
        btn.classList.add('wrong');
        opts[q.a].classList.add('correct');
      }
      document.getElementById('quizExplainSlot').innerHTML = `<div class="quiz-explain">${q.exp}</div>`;
      document.getElementById('quizNext').style.display = 'inline-block';
    });
  });
  document.getElementById('quizNext').addEventListener('click', ()=>{ quizIdx++; renderQuizQuestion(); });
}

buildRail();
buildNav();
renderMain();
</script>
